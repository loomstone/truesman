[project]
name = "truesman-pos"
version = "0.1.0"
description = "POS adapter abstraction for Truesman voicebot platform"
requires-python = ">=3.11"
dependencies = [
    "supabase>=2.9.0",
    "pydantic>=2.9.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pos"]